name: Aurora Job Monitor

on:
  schedule:
    - cron: "0 7 * * *"  # 09:00 Europe/Rome during daylight saving time
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python job_monitor.py --config config.yaml --since-days 3
      - uses: actions/upload-artifact@v4
        with:
          name: aurora-job-report
          path: |
            reports/latest_jobs.csv
            reports/latest_report.md
            job_monitor.sqlite3
